<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEC IT Asset System | University of East Capital</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --blue: #003366; --gold: #C5A059; --white: #ffffff; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f4f8; margin: 0; }
        
        header { background: var(--blue); color: white; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .logo-container { display: flex; align-items: center; gap: 12px; background: white; padding: 5px 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-container img { height: 45px; width: auto; }
        
        .container { max-width: 950px; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .search-area { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 25px; border-right: 5px solid var(--blue); display: flex; gap: 10px; align-items: flex-end; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        
        .btn-blue { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-gold { background: var(--gold); color: var(--blue); border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .signature-wrapper { border: 2px dashed #ddd; background: #fafafa; height: 180px; position: relative; margin: 10px 0; border-radius: 8px; }
        canvas { width: 100%; height: 100%; }
        
        /* صورة التوقيع للطباعة */
        #printSignatureImg { display: none; max-height: 150px; border: 1px solid #eee; }

        @media print {
            .no-print, header, #loginOverlay, button { display: none !important; }
            .container { box-shadow: none; margin: 0; width: 100%; display: block !important; border: none; }
            .print-header { display: flex !important; align-items: center; justify-content: center; gap: 20px; border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 20px; }
            .print-header img { height: 80px; }
            .signature-wrapper { display: none !important; }
            #printSignatureImg { display: block !important; margin: 20px auto; }
            input, select, textarea { border: none !important; background: transparent !important; padding: 5px !important; font-weight: bold; }
        }
        .print-header { display: none; }
        #loginOverlay { position: fixed; inset: 0; background: var(--blue); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 15px; width: 320px; text-align: center; border-top: 6px solid var(--gold); }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <img src="logo.png" style="height: 50px; margin-bottom: 20px;" onerror="this.style.display='none'">
        <h2 style="color:var(--blue); margin-top:0;">UEC IT LOGIN</h2>
        <input type="text" id="userInput" placeholder="Username">
        <input type="password" id="passInput" placeholder="Password" style="margin-top:10px">
        <button onclick="handleLogin()" class="btn-blue" id="loginBtn" style="margin-top:20px; width:100%">Login</button>
    </div>
</div>

<header>
    <div class="logo-container">
        <img src="logo.png" alt="UEC Logo" onerror="this.style.display='none'">
        <div style="border-right: 1px solid #ddd; padding-right: 10px;">
            <b style="color:var(--blue); display:block; line-height:1;">UEC</b>
            <span style="color:var(--gold); font-size:0.7rem; font-weight:bold;">UNIVERSITY OF EAST CAPITAL</span>
        </div>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
        <span id="adminInfo" style="font-size:0.8rem;"></span>
        <button onclick="toggleLang()" class="btn-gold" id="langBtn">English</button>
        <button onclick="handleLogout()" class="btn-blue" style="background:#d9534f;">Logout</button>
    </div>
</header>

<div class="container" id="mainApp">
    
    <div class="print-header">
        <img src="logo.png">
        <div style="text-align:center">
            <h2 style="margin:0">University of East Capital - IT Department</h2>
            <p style="margin:5px 0">Asset Handover Form | استمارة عهدة فنية</p>
        </div>
    </div>

    <div class="search-area no-print">
        <div style="flex:1">
            <label id="lblSearch" style="font-weight:bold; font-size:0.8rem">بحث بالرقم الوظيفي (Search by ID)</label>
            <input type="text" id="searchID" placeholder="...">
        </div>
        <button type="button" onclick="searchEmployee()" class="btn-gold">Search</button>
        <button type="button" onclick="resetForm()" class="btn-blue" style="background:#5bc0de">New / جديد</button>
    </div>

    <form id="assetForm">
        <div class="grid">
            <div style="grid-column: span 2">
                <label id="lblTrans">نوع العملية</label>
                <select id="transType">
                    <option value="Issue">استلام عهدة (Issue)</option>
                    <option value="Return">إرجاع عهدة (Return)</option>
                    <option value="Transfer">نقل ملكية (Transfer)</option>
                </select>
            </div>
            <div><label id="lblID">الرقم الوظيفي</label><input type="text" id="empID" required></div>
            <div><label id="lblName">اسم الموظف</label><input type="text" id="empName" required></div>
            <div><label id="lblType">نوع الجهاز</label><select id="assetList"></select></div>
            <div><label id="lblSN">السيريال (S/N)</label><input type="text" id="sn" required></div>
            <div style="grid-column: span 2">
                <label id="lblSpecs">المواصفات والملحقات</label>
                <textarea id="specs" rows="3"></textarea>
            </div>
        </div>

        <label id="lblSign">توقيع الموظف</label>
        <div class="signature-wrapper no-print">
            <canvas id="signature-pad"></canvas>
            <button type="button" onclick="signaturePad.clear()" style="position:absolute; bottom:10px; left:10px; background:#ff4444; color:white; border:none; padding:5px; border-radius:4px; cursor:pointer;">Clear</button>
        </div>
        
        <img id="printSignatureImg">
        
        <div class="grid no-print" style="margin-top:20px">
            <button type="submit" id="saveBtn" class="btn-blue">حفظ البيانات (Save)</button>
            <button type="button" onclick="preparePrint()" class="btn-gold">طباعة (Print)</button>
        </div>
    </form>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-r35RwmB06Ydm2EkXF5P2yMpXu-d4QeeseN5QJ9UpKGNWsqQB3P27OvVT-ZjcYRtC/exec"; // رابط السكريبت الخاص بك
    const canvas = document.getElementById('signature-pad');
    const signaturePad = new SignaturePad(canvas);
    let lang = localStorage.getItem('uec_lang') || 'ar';

    function applyLang() {
        const isAr = lang === 'ar';
        document.getElementById('mainHtml').dir = isAr ? 'rtl' : 'ltr';
        document.getElementById('langBtn').innerText = isAr ? 'English' : 'العربية';
        // ... (باقي الترجمات كما في النسخة السابقة)
    }

    function handleLogin() {
        const user = document.getElementById('userInput').value;
        const pass = document.getElementById('passInput').value;
        fetch(`${SCRIPT_URL}?action=login`, { method: 'POST', body: JSON.stringify({user, pass}) })
        .then(res => res.json()).then(data => {
            if(data.status === "success") {
                sessionStorage.setItem('uec_admin', data.name);
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('adminInfo').innerText = "Admin: " + data.name;
                const list = document.getElementById('assetList');
                list.innerHTML = "";
                data.devices.forEach(d => { let opt = document.createElement('option'); opt.value = d; opt.innerText = d; list.appendChild(opt); });
                resizeCanvas();
            } else { alert("Login Error!"); }
        });
    }

    function searchEmployee() {
        const empID = document.getElementById('searchID').value;
        fetch(`${SCRIPT_URL}?action=search`, { method: 'POST', body: JSON.stringify({empID}) })
        .then(res => res.json()).then(res => {
            if(res.data && res.data.length > 0) {
                const last = res.data[res.data.length - 1];
                document.getElementById('empID').value = last[3];
                document.getElementById('empName').value = last[4];
                document.getElementById('sn').value = last[6];
                document.getElementById('specs').value = last[7];
            } else { alert("Not Found"); }
        });
    }

    // دالة الطباعة المحسنة لجلب التوقيع
    function preparePrint() {
        if(signaturePad.isEmpty()) {
            alert("يرجى التوقيع أولاً ليظهر في الطباعة");
            return;
        }
        const dataUrl = signaturePad.toDataURL();
        document.getElementById('printSignatureImg').src = dataUrl;
        setTimeout(() => { window.print(); }, 200);
    }

    function resetForm() {
        document.getElementById('assetForm').reset();
        signaturePad.clear();
        document.getElementById('printSignatureImg').src = "";
    }

    function handleLogout() { sessionStorage.clear(); window.location.reload(); }
    function toggleLang() { lang = lang === 'ar' ? 'en' : 'ar'; localStorage.setItem('uec_lang', lang); applyLang(); }

    document.getElementById('assetForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        const payload = {
            admin: sessionStorage.getItem('uec_admin'),
            trans: document.getElementById('transType').value,
            empID: document.getElementById('empID').value,
            empName: document.getElementById('empName').value,
            asset: document.getElementById('assetList').value,
            sn: document.getElementById('sn').value,
            specs: document.getElementById('specs').value,
            signature: signaturePad.toDataURL()
        };
        fetch(`${SCRIPT_URL}?action=save`, { method: 'POST', body: JSON.stringify(payload) })
        .then(() => { alert("Saved!"); btn.disabled = false; resetForm(); });
    };

    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
    }

    applyLang();
    window.onresize = resizeCanvas;
</script>
</body>
</html>
