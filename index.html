<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEC Asset Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --blue: #003366; --gold: #C5A059; --white: #ffffff; --gray: #f4f7f6; }
        body { font-family: 'Tajawal', sans-serif; background: var(--gray); margin: 0; }
        
        #loginOverlay { position: fixed; inset: 0; background: linear-gradient(135deg, var(--blue) 0%, #001a33 100%); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 350px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.4); border-top: 8px solid var(--gold); }
        .login-card img { max-width: 140px; margin-bottom: 20px; }
        .login-card input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }

        header { background: var(--blue); color: white; padding: 5px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--gold); height: 65px; position: sticky; top: 0; z-index: 100; }
        .logo-container { display: flex; align-items: center; gap: 10px; background: white; padding: 5px 12px; border-radius: 8px; height: 48px; }
        .logo-container img { height: 38px; }

        .container { max-width: 900px; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; display: none; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: #eee; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tab-btn.active { background: var(--blue); color: white; }

        .search-area { background: #eef2f3; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-right: 6px solid var(--blue); display: flex; gap: 10px; align-items: flex-end; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        
        .status-banner { grid-column: span 2; background: #fff4e5; border: 1px solid var(--gold); padding: 10px; border-radius: 8px; color: #856404; font-weight: bold; display: none; margin-bottom: 10px; }
        .btn-blue { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-gold { background: var(--gold); color: var(--blue); border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-bottom: 5px solid var(--blue); }
        .stat-card p { font-size: 1.8rem; font-weight: bold; margin: 10px 0 0; color: var(--blue); }

        .signature-wrapper { border: 2px dashed #bbb; background: #fdfdfd; height: 160px; position: relative; margin: 10px 0; border-radius: 8px; }
        canvas { width: 100%; height: 100%; }
        #searchSignaturePreview { display: none; margin: 10px 0; text-align: center; }
        #searchSignaturePreview img { max-height: 80px; border: 1px solid #ddd; }
        #printSignatureImg { display: none; max-height: 110px; margin: 10px auto; }

        @media print {
            .no-print, header, #loginOverlay, .tabs, button, .signature-wrapper, #searchSignaturePreview { display: none !important; }
            .container { display: block !important; box-shadow: none; margin: 0; width: 100%; }
            .print-header { display: flex !important; align-items: center; justify-content: center; border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 25px; }
            .print-header img { height: 80px; }
            #printSignatureImg { display: block !important; }
            .status-banner { display: block !important; background: transparent; border: 1px solid #000; }
            input, select, textarea { border: none !important; font-weight: bold; background: transparent !important; }
        }
        .print-header { display: none; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <img src="logo.png" alt="Logo">
        <h2 style="color:var(--blue);">UEC IT ASSETS</h2>
        <input type="text" id="userInput" placeholder="Username">
        <input type="password" id="passInput" placeholder="Password">
        <button onclick="handleLogin()" class="btn-blue" id="loginBtn">Login</button>
    </div>
</div>

<header>
    <div class="logo-container">
        <img src="logo.png" alt="Logo">
        <div style="border-right: 1px solid #ddd; padding-right: 8px;">
            <b style="color:var(--blue); font-size: 1.1rem; line-height:1;">UEC</b>
            <span style="color:var(--gold); font-size:0.6rem; display:block;">UNIVERSITY OF EAST CAPITAL</span>
        </div>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
        <span id="adminInfo" style="font-size:0.8rem;"></span>
        <button onclick="toggleLang()" class="btn-gold" id="langBtn" style="padding:5px 15px;">English</button>
        <button onclick="handleLogout()" class="btn-blue" style="background:#d9534f; width:auto; padding:5px 15px;">Logout</button>
    </div>
</header>

<div class="container" id="mainApp">
    <div class="tabs no-print">
        <button id="formTab" class="tab-btn active" onclick="switchTab('form')">النماذج | Forms</button>
        <button id="dashTab" class="tab-btn" onclick="switchTab('dash')" style="display:none;">لوحة التحكم | Dashboard</button>
    </div>

    <div class="print-header">
        <img src="logo.png">
        <div style="text-align:center">
            <h2 style="margin:0">University of East Capital - IT Department</h2>
            <p>Asset Handover Form | استمارة عهدة</p>
        </div>
    </div>

    <div id="formSection">
        <div class="search-area no-print">
            <div style="flex:1"><label id="lblSearch">بحث بالرقم الوظيفي</label><input type="text" id="searchID"></div>
            <button type="button" onclick="searchEmployee()" class="btn-gold" id="btnSearch">Search</button>
            <button type="button" onclick="resetForm()" class="btn-blue" id="btnNew" style="background:#5bc0de; width:auto;">New</button>
        </div>

        <div id="searchSignaturePreview" class="no-print">
            <p id="lblFoundSig" style="font-size:0.7rem;">توقيع مسجل:</p>
            <img id="foundSigImg" src="">
        </div>

        <form id="assetForm">
            <div id="statusBanner" class="status-banner"></div>
            <div id="transferSection" class="no-print" style="display:none; background:#fff9eb; padding:15px; border-radius:10px; margin-bottom:15px;">
                <label id="lblTransferTo">نقل العهدة إلى:</label>
                <input type="text" id="newReceiver">
            </div>

            <div class="grid">
                <div style="grid-column: span 2">
                    <label id="lblTrans">نوع العملية</label>
                    <select id="transType" onchange="checkTransfer()">
                        <option value="Issue">Issue</option>
                        <option value="Return">Return</option>
                        <option value="Transfer">Transfer</option>
                    </select>
                </div>
                <div><label id="lblID">ID</label><input type="text" id="empID" required></div>
                <div><label id="lblName">Name</label><input type="text" id="empName" required></div>
                <div><label id="lblType">Type</label><select id="assetList"></select></div>
                <div><label id="lblSN">S/N</label><input type="text" id="sn" required></div>
                <div style="grid-column: span 2"><label id="lblSpecs">Specs</label><textarea id="specs" rows="2"></textarea></div>
            </div>

            <label id="lblSign" class="no-print">التوقيع</label>
            <div class="signature-wrapper no-print">
                <canvas id="signature-pad"></canvas>
                <button type="button" onclick="signaturePad.clear()" style="position:absolute; bottom:10px; left:10px;">Clear</button>
            </div>
            <img id="printSignatureImg">
            
            <div class="grid no-print" style="margin-top:20px">
                <button type="submit" id="saveBtn" class="btn-blue">Save</button>
                <button type="button" onclick="preparePrint()" id="btnPrint" class="btn-gold">Print</button>
            </div>
        </form>
    </div>

    <div id="dashSection" style="display:none;">
        <div class="dash-grid">
            <div class="stat-card"><h3>إجمالي الأجهزة</h3><p id="totalAssets">0</p></div>
            <div class="stat-card"><h3>خارج المخزن</h3><p id="issuedAssets">0</p></div>
            <div class="stat-card"><h3>في المخزن</h3><p id="stockAssets">0</p></div>
        </div>
        <div style="background:#fff; padding:20px; border-radius:12px;">
            <h3 style="color:var(--blue)">آخر العمليات:</h3>
            <table style="width:100%; text-align:right; font-size:0.8rem; border-collapse:collapse;" border="1" cellpadding="5">
                <tbody id="recentLogsBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-r35RwmB06Ydm2EkXF5P2yMpXu-d4QeeseN5QJ9UpKGNWsqQB3P27OvVT-ZjcYRtC/exec"; // ضع رابط السكربت هنا
    const canvas = document.getElementById('signature-pad');
    const signaturePad = new SignaturePad(canvas);
    let lang = localStorage.getItem('uec_lang') || 'ar';
    let loadedSignature = "";

    const translations = {
        ar: { search: "بحث بالرقم الوظيفي", btnSearch: "بحث", btnNew: "جديد", trans: "نوع العملية", id: "الرقم الوظيفي", name: "اسم الموظف", type: "نوع الجهاز", sn: "السيريال", specs: "المواصفات", sign: "التوقيع", save: "حفظ", print: "طباعة", transfer: "نقل إلى:", cleared: "تم إخلاء العهدة في: ", transferred: "تم النقل إلى " },
        en: { search: "Search by ID", btnSearch: "Search", btnNew: "New", trans: "Process", id: "ID", name: "Employee Name", type: "Asset Type", sn: "S/N", specs: "Specs", sign: "Signature", save: "Save", print: "Print", transfer: "Transfer To:", cleared: "Cleared on: ", transferred: "Transferred to " }
    };

    function applyLang() {
        const d = translations[lang];
        document.getElementById('mainHtml').dir = lang === 'ar' ? 'rtl' : 'ltr';
        document.getElementById('langBtn').innerText = lang === 'ar' ? 'English' : 'العربية';
        document.getElementById('lblSearch').innerText = d.search;
        document.getElementById('btnSearch').innerText = d.btnSearch;
        document.getElementById('btnNew').innerText = d.btnNew;
        document.getElementById('lblTrans').innerText = d.trans;
        document.getElementById('lblID').innerText = d.id;
        document.getElementById('lblName').innerText = d.name;
        document.getElementById('lblType').innerText = d.type;
        document.getElementById('lblSN').innerText = d.sn;
        document.getElementById('lblSpecs').innerText = d.specs;
        document.getElementById('lblSign').innerText = d.sign;
        document.getElementById('saveBtn').innerText = d.save;
        document.getElementById('btnPrint').innerText = d.print;
    }

    function handleLogin() {
        const user = document.getElementById('userInput').value;
        const pass = document.getElementById('passInput').value;
        fetch(`${SCRIPT_URL}?action=login`, { method: 'POST', body: JSON.stringify({user, pass}) })
        .then(res => res.json()).then(data => {
            if(data.status === "success") {
                localStorage.setItem('uec_user', data.name);
                localStorage.setItem('uec_devices', JSON.stringify(data.devices));
                localStorage.setItem('uec_isSuper', data.isSuper);
                showApp(data);
            } else { alert("Login Error!"); }
        });
    }

    function showApp(data) {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('adminInfo').innerText = "User: " + data.name;
        if(data.isSuper) document.getElementById('dashTab').style.display = 'block';
        
        const list = document.getElementById('assetList');
        list.innerHTML = "";
        data.devices.forEach(d => { let opt = document.createElement('option'); opt.value = d; opt.innerText = d; list.appendChild(opt); });
        resizeCanvas();
    }

    function switchTab(t) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if(t === 'form') {
            document.getElementById('formSection').style.display = 'block';
            document.getElementById('dashSection').style.display = 'none';
            document.getElementById('formTab').classList.add('active');
        } else {
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('dashSection').style.display = 'block';
            document.getElementById('dashTab').classList.add('active');
            loadDashboard();
        }
    }

    function loadDashboard() {
        const user = localStorage.getItem('uec_user');
        fetch(`${SCRIPT_URL}?action=getDashboard`, { method: 'POST', body: JSON.stringify({user}) })
        .then(res => res.json()).then(s => {
            document.getElementById('totalAssets').innerText = s.total;
            document.getElementById('issuedAssets').innerText = s.issued;
            document.getElementById('stockAssets').innerText = s.returned;
            const tbody = document.getElementById('recentLogsBody');
            tbody.innerHTML = s.recentLogs.map(r => `<tr><td>${r[0].split('T')[0]}</td><td>${r[2]}</td><td>${r[4]}</td><td>${r[5]}</td></tr>`).join('');
        });
    }

    function searchEmployee() {
        const empID = document.getElementById('searchID').value;
        const banner = document.getElementById('statusBanner');
        fetch(`${SCRIPT_URL}?action=search`, { method: 'POST', body: JSON.stringify({empID}) })
        .then(res => res.json()).then(res => {
            if(res.data && res.data.length > 0) {
                const last = res.data[res.data.length - 1];
                const type = last[2].toLowerCase();
                const d = new Date(last[0]).toLocaleString();
                
                document.getElementById('empID').value = last[3];
                document.getElementById('empName').value = last[4];
                document.getElementById('sn').value = last[6];
                document.getElementById('specs').value = last[7];
                
                banner.style.display = "none";
                if(type.includes("return")) { banner.innerText = translations[lang].cleared + d; banner.style.display = "block"; }
                else if(type.includes("transfer")) { banner.innerText = translations[lang].transferred + type.replace("transfer to ","") + " ("+d+")"; banner.style.display = "block"; }

                if(last[8]) { loadedSignature = last[8]; document.getElementById('foundSigImg').src = loadedSignature; document.getElementById('searchSignaturePreview').style.display = "block"; }
            }
        });
    }

    function preparePrint() {
        let sig = signaturePad.isEmpty() ? loadedSignature : signaturePad.toDataURL();
        document.getElementById('printSignatureImg').src = sig;
        setTimeout(() => window.print(), 500);
    }

    function resetForm() {
        document.getElementById('assetForm').reset();
        signaturePad.clear();
        loadedSignature = "";
        document.getElementById('statusBanner').style.display = 'none';
        document.getElementById('searchSignaturePreview').style.display = 'none';
    }

    document.getElementById('assetForm').onsubmit = function(e) {
        e.preventDefault();
        const payload = {
            admin: localStorage.getItem('uec_user'),
            trans: document.getElementById('transType').value + (document.getElementById('newReceiver').value ? " to " + document.getElementById('newReceiver').value : ""),
            empID: document.getElementById('empID').value,
            empName: document.getElementById('empName').value,
            asset: document.getElementById('assetList').value,
            sn: document.getElementById('sn').value,
            specs: document.getElementById('specs').value,
            signature: signaturePad.isEmpty() ? loadedSignature : signaturePad.toDataURL()
        };
        fetch(`${SCRIPT_URL}?action=save`, { method: 'POST', body: JSON.stringify(payload) })
        .then(() => { alert("Saved!"); resetForm(); });
    };

    function checkTransfer() { document.getElementById('transferSection').style.display = document.getElementById('transType').value === 'Transfer' ? 'block' : 'none'; }
    function toggleLang() { lang = lang === 'ar' ? 'en' : 'ar'; localStorage.setItem('uec_lang', lang); applyLang(); resizeCanvas(); }
    function handleLogout() { localStorage.clear(); window.location.reload(); }
    function resizeCanvas() { const r = Math.max(window.devicePixelRatio || 1, 1); canvas.width = canvas.offsetWidth * r; canvas.height = canvas.offsetHeight * r; canvas.getContext("2d").scale(r, r); }

    applyLang();
    if(localStorage.getItem('uec_user')) {
        showApp({name: localStorage.getItem('uec_user'), devices: JSON.parse(localStorage.getItem('uec_devices')), isSuper: localStorage.getItem('uec_isSuper') === 'true'});
    }
</script>
</body>
</html>
