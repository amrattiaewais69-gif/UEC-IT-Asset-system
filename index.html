<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEC IT Asset System</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --blue: #003366; --gold: #C5A059; --white: #ffffff; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f4f8; margin: 0; transition: 0.3s; }
        [dir="ltr"] { font-family: 'Inter', sans-serif; }
        
        /* Header & Logo Section */
        header { background: var(--blue); color: white; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .logo-container { display: flex; align-items: center; gap: 12px; background: white; padding: 5px 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-container img { height: 45px; width: auto; }
        .logo-text { border-right: 1px solid #ddd; padding-right: 10px; line-height: 1.2; }
        .logo-text b { color: var(--blue); font-size: 1.2rem; display: block; }
        .logo-text span { color: var(--gold); font-size: 0.7rem; font-weight: bold; }

        .container { max-width: 950px; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* Search & Controls */
        .search-area { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 25px; border-right: 5px solid var(--blue); display: flex; gap: 10px; align-items: flex-end; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        /* Buttons */
        .btn-blue { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-gold { background: var(--gold); color: var(--blue); border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-blue:hover { background: #002244; opacity: 0.9; }
        
        /* Signature Area */
        .signature-wrapper { border: 2px dashed #ddd; background: #fafafa; height: 180px; position: relative; margin: 10px 0; border-radius: 8px; }
        canvas { width: 100%; height: 100%; }
        #prevSignatureBox { margin-top: 10px; padding: 10px; border: 1px solid #eee; border-radius: 8px; display: none; text-align: center; }
        #prevSignatureBox img { max-height: 100px; border: 1px solid #ddd; }

        /* Login Overlay */
        #loginOverlay { position: fixed; inset: 0; background: var(--blue); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 15px; width: 320px; text-align: center; border-top: 6px solid var(--gold); }

        /* Print Settings */
        @media print {
            .no-print, header, #loginOverlay, button { display: none !important; }
            .container { box-shadow: none; margin: 0; width: 100%; display: block !important; }
            .print-header { display: flex !important; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px; border-bottom: 2px solid #000; padding-bottom: 10px; }
            .print-header img { height: 80px; }
            body { background: white; }
            .signature-wrapper { border: 1px solid #000; }
        }
        .print-header { display: none; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h2 style="color:var(--blue)">UEC IT LOGIN</h2>
        <input type="text" id="userInput" placeholder="Username" style="margin-bottom:10px">
        <input type="password" id="passInput" placeholder="Password" style="margin-bottom:20px">
        <button onclick="handleLogin()" class="btn-blue" id="loginBtn">Login</button>
    </div>
</div>

<header>
    <div class="logo-container">
        <img src="logo.png" alt="UEC Logo" onerror="this.style.display='none'">
        <div class="logo-text">
            <b>UEC</b>
            <span>UNIVERSITY OF<br>EAST CAPITAL</span>
        </div>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
        <span id="adminInfo" style="font-size:0.8rem; opacity:0.9;"></span>
        <button onclick="toggleLang()" class="btn-gold" id="langBtn" style="padding:5px 15px">English</button>
        <button onclick="handleLogout()" class="btn-blue" style="background:#d9534f; padding:5px 15px">Logout</button>
    </div>
</header>

<div class="container" id="mainApp">
    
    <div class="print-header">
        <img src="logo.png" alt="Logo">
        <div style="text-align:center">
            <h2 style="margin:0">University of East Capital</h2>
            <p style="margin:5px 0">IT Asset Handover Form | نموذج استلام عهدة</p>
        </div>
    </div>

    <div class="search-area no-print">
        <div style="flex:1">
            <label id="lblSearch" style="font-weight:bold; font-size:0.8rem">بحث بالرقم الوظيفي (Search by ID)</label>
            <input type="text" id="searchID" placeholder="...">
        </div>
        <button type="button" onclick="searchEmployee()" class="btn-gold" style="width:100px">Search</button>
        <button type="button" onclick="resetForm()" class="btn-blue" style="background:#5bc0de; width:120px">New / جديد</button>
    </div>

    <form id="assetForm">
        <div class="grid">
            <div style="grid-column: span 2">
                <label id="lblTrans">نوع العملية</label>
                <select id="transType">
                    <option value="Issue">استلام عهدة (Issue)</option>
                    <option value="Return">إرجاع عهدة (Return)</option>
                    <option value="Transfer">نقل ملكية (Transfer)</option>
                </select>
            </div>
            <div><label id="lblID">الرقم الوظيفي</label><input type="text" id="empID" required></div>
            <div><label id="lblName">اسم الموظف</label><input type="text" id="empName" required></div>
            <div><label id="lblType">نوع الجهاز</label><select id="assetList"></select></div>
            <div><label id="lblSN">السيريال (S/N)</label><input type="text" id="sn" required></div>
            <div style="grid-column: span 2">
                <label id="lblSpecs">المواصفات والملحقات</label>
                <textarea id="specs" rows="3" placeholder="RAM, CPU, Charger, Bag..."></textarea>
            </div>
        </div>

        <label id="lblSign">توقيع الموظف</label>
        <div class="signature-wrapper">
            <canvas id="signature-pad"></canvas>
            <button type="button" class="no-print" onclick="signaturePad.clear()" style="position:absolute; bottom:10px; left:10px; background:#ff4444; color:white; border:none; padding:5px; border-radius:4px; cursor:pointer;">Clear</button>
        </div>

        <div id="prevSignatureBox" class="no-print">
            <p style="font-size:0.8rem; color:#666;">التوقيع المسجل سابقاً لهذا الموظف:</p>
            <img id="prevImg" src="" alt="Prev Sign">
        </div>
        
        <div class="grid no-print" style="margin-top:20px">
            <button type="submit" id="saveBtn" class="btn-blue">حفظ البيانات (Save)</button>
            <button type="button" onclick="window.print()" class="btn-gold">طباعة (Print)</button>
        </div>
    </form>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-r35RwmB06Ydm2EkXF5P2yMpXu-d4QeeseN5QJ9UpKGNWsqQB3P27OvVT-ZjcYRtC/exec"; // <--- ضع رابط جوجل هنا
    const canvas = document.getElementById('signature-pad');
    const signaturePad = new SignaturePad(canvas);
    let lang = localStorage.getItem('uec_lang') || 'ar';

    function applyLang() {
        const isAr = lang === 'ar';
        document.getElementById('mainHtml').dir = isAr ? 'rtl' : 'ltr';
        document.getElementById('langBtn').innerText = isAr ? 'English' : 'العربية';
        document.getElementById('lblSearch').innerText = isAr ? 'بحث بالرقم الوظيفي' : 'Search by ID';
        document.getElementById('lblTrans').innerText = isAr ? 'نوع العملية' : 'Transaction Type';
        document.getElementById('lblID').innerText = isAr ? 'الرقم الوظيفي' : 'Employee ID';
        document.getElementById('lblName').innerText = isAr ? 'اسم الموظف' : 'Employee Name';
        document.getElementById('lblType').innerText = isAr ? 'نوع الجهاز' : 'Asset Type';
        document.getElementById('lblSN').innerText = isAr ? 'السيريال (S/N)' : 'Serial Number';
        document.getElementById('lblSpecs').innerText = isAr ? 'المواصفات والملحقات' : 'Specs & Accessories';
        document.getElementById('lblSign').innerText = isAr ? 'توقيع الموظف' : 'Signature';
        document.getElementById('saveBtn').innerText = isAr ? 'حفظ البيانات (Save)' : 'Save Record';
    }

    function handleLogin() {
        const user = document.getElementById('userInput').value;
        const pass = document.getElementById('passInput').value;
        const btn = document.getElementById('loginBtn');
        btn.disabled = true; btn.innerText = "...";

        fetch(`${SCRIPT_URL}?action=login`, { method: 'POST', body: JSON.stringify({user, pass}) })
        .then(res => res.json()).then(data => {
            if(data.status === "success") {
                sessionStorage.setItem('uec_admin', data.name);
                showApp(data.name, data.devices);
            } else { alert("Login Failed!"); btn.disabled = false; btn.innerText = "Login"; }
        }).catch(err => { alert("Connection Error"); btn.disabled = false; });
    }

    function showApp(name, devices) {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('adminInfo').innerText = "Admin: " + name;
        const list = document.getElementById('assetList');
        list.innerHTML = "";
        devices.forEach(d => { let opt = document.createElement('option'); opt.value = d; opt.innerText = d; list.appendChild(opt); });
        resizeCanvas();
    }

    function searchEmployee() {
        const empID = document.getElementById('searchID').value;
        if(!empID) return;
        fetch(`${SCRIPT_URL}?action=search`, { method: 'POST', body: JSON.stringify({empID}) })
        .then(res => res.json()).then(res => {
            if(res.data && res.data.length > 0) {
                const last = res.data[res.data.length - 1];
                document.getElementById('empID').value = last[3];
                document.getElementById('empName').value = last[4];
                document.getElementById('sn').value = last[6];
                document.getElementById('specs').value = last[7];
                // إظهار التوقيع القديم
                if(last[8]) {
                    document.getElementById('prevImg').src = last[8];
                    document.getElementById('prevSignatureBox').style.display = "block";
                }
            } else { alert("No Record Found"); }
        });
    }

    function resetForm() {
        document.getElementById('assetForm').reset();
        signaturePad.clear();
        document.getElementById('prevSignatureBox').style.display = "none";
    }

    function handleLogout() {
        sessionStorage.clear();
        window.location.reload();
    }

    function toggleLang() {
        lang = lang === 'ar' ? 'en' : 'ar';
        localStorage.setItem('uec_lang', lang);
        applyLang();
    }

    document.getElementById('assetForm').onsubmit = function(e) {
        e.preventDefault();
        if(signaturePad.isEmpty()) return alert("Please Sign");
        const btn = document.getElementById('saveBtn');
        btn.disabled = true;

        const payload = {
            admin: sessionStorage.getItem('uec_admin'),
            trans: document.getElementById('transType').value,
            empID: document.getElementById('empID').value,
            empName: document.getElementById('empName').value,
            asset: document.getElementById('assetList').value,
            sn: document.getElementById('sn').value,
            specs: document.getElementById('specs').value,
            signature: signaturePad.toDataURL()
        };

        fetch(`${SCRIPT_URL}?action=save`, { method: 'POST', body: JSON.stringify(payload) })
        .then(res => res.json()).then(data => {
            alert("Record Saved Successfully!");
            resetForm();
            btn.disabled = false;
        });
    };

    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
    }

    applyLang();
    window.onresize = resizeCanvas;
    if(sessionStorage.getItem('uec_admin')) {
         // إذا كان مسجل دخول، نحتاج فقط لإعادة تحميل البيانات (اختياري للسرعة)
    }
</script>
</body>
</html>
