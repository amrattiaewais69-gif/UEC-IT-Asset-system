<!DOCTYPE html>
<html dir="rtl">
<head>
    <base target="_top">
    <style>
        :root { --blue: #003366; --gold: #D4AF37; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--white); margin: 0; padding: 20px; color: #333; }
        
        /* تصميم الهيدر الاحترافي كما طلبت */
        .header { text-align: center; border-bottom: 2px solid var(--blue); padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { color: var(--blue); margin: 10px 0; font-size: 24px; text-transform: uppercase; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tab-btn { padding: 10px 25px; border: none; background: #eee; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .tab-btn.active { background: var(--blue); color: white; }

        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-submit { background: var(--blue); color: white; border: none; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-submit:hover { opacity: 0.9; }

        /* ستايل لوحة التحليل الجديدة */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .stat-box { padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #eee; }
        .stat-box h3 { margin: 5px 0; color: var(--blue); }
        .table-res { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        .table-res th, .table-res td { border: 1px solid #eee; padding: 10px; text-align: right; }
        .table-res th { background: #f8f9fa; color: var(--blue); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>UNIVERSITY OF EAST CAPITAL</h1>
        <p style="color: var(--gold); font-weight: bold; margin: 0;">ASSET MANAGEMENT SYSTEM</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('entry')">تسجيل حركة</button>
        <button class="tab-btn" onclick="showTab('analysis')">التحليل الذكي 📊</button>
    </div>

    <!-- قسم إدخال البيانات -->
    <div id="entrySection">
        <div class="card">
            <h3 style="color: var(--blue);">إضافة عملية جديدة</h3>
            <input type="text" id="adminName" placeholder="اسم الأدمن">
            <select id="transType">
                <option value="Issue Out">صرف عهدة (Issue Out)</option>
                <option value="Return In">مرتجع (Return In)</option>
            </select>
            <input type="text" id="empID" placeholder="رقم الموظف">
            <input type="text" id="empName" placeholder="اسم الموظف">
            <input type="text" id="assetType" placeholder="نوع الجهاز (Laptop, Mobile...)">
            <input type="text" id="sn" placeholder="السيريال نمبر">
            <button class="btn-submit" onclick="submitData()">حفظ البيانات</button>
        </div>
    </div>

    <!-- قسم التحليل المتقدم (الإضافة الجديدة) -->
    <div id="analysisSection" style="display:none;">
        <div class="card">
            <h3 style="color: var(--blue);">محرك الاستعلام والتحليل</h3>
            <div style="display:flex; gap:10px;">
                <input type="text" id="searchEmpID" placeholder="أدخل رقم الموظف للتحليل المتقدم...">
                <button onclick="runAnalysis()" style="width:150px; background:var(--gold); color:white; border:none; cursor:pointer;">تحليل</button>
            </div>
            
            <div class="stat-grid" id="empStatsBoxes" style="display:none; margin-top:20px;">
                <div class="stat-box"> <small>إجمالي المنصرف</small><h3 id="statIssued">0</h3> </div>
                <div class="stat-box"> <small>إجمالي المرتجع</small><h3 id="statReturned">0</h3> </div>
                <div class="stat-box" style="background:#eef6ff;"> <small>العهدة الحالية</small><h3 id="statCurrent">0</h3> </div>
            </div>

            <div id="analysisResult" style="margin-top:20px;"></div>
        </div>
    </div>
</div>

<script>
function showTab(tab) {
    document.getElementById('entrySection').style.display = tab === 'entry' ? 'block' : 'none';
    document.getElementById('analysisSection').style.display = tab === 'analysis' ? 'block' : 'none';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    event.currentTarget.classList.add('active');
}

function submitData() {
    const data = {
        admin: document.getElementById('adminName').value,
        type: document.getElementById('transType').value,
        empID: document.getElementById('empID').value,
        empName: document.getElementById('empName').value,
        assetType: document.getElementById('assetType').value,
        sn: document.getElementById('sn').value,
        specs: ""
    };
    
    google.script.run.withSuccessHandler(() => {
        alert("تم الحفظ بنجاح");
        document.querySelectorAll('input').forEach(i => i.value = "");
    }).saveData(data);
}

function runAnalysis() {
    const empID = document.getElementById('searchEmpID').value;
    const resultDiv = document.getElementById('analysisResult');
    resultDiv.innerHTML = "جاري التحليل...";

    google.script.run.withSuccessHandler(data => {
        // تحديث الصناديق
        document.getElementById('empStatsBoxes').style.display = 'grid';
        document.getElementById('statIssued').innerText = data.employeeStats.issued;
        document.getElementById('statReturned').innerText = data.employeeStats.returned;
        document.getElementById('statCurrent').innerText = data.employeeStats.current;

        // جدول العهدة الحالية
        let html = `<h4>العهدة الحالية للموظف:</h4><table class="table-res"><thead><tr><th>الجهاز</th><th>السيريال</th><th>تاريخ الاستلام</th></tr></thead><tbody>`;
        data.employeeAssets.forEach(a => {
            html += `<tr><td>${a.asset}</td><td>${a.sn}</td><td>${new Date(a.date).toLocaleDateString()}</td></tr>`;
        });
        html += `</tbody></table>`;

        // تنبيهات التقادم (أكثر من 90 يوم)
        if(data.agingReport.above90.length > 0) {
            html += `<h4 style="color:red; margin-top:20px;">⚠️ أجهزة تجاوزت 90 يوماً عهدة:</h4><table class="table-res"><thead><tr><th>الموظف</th><th>الجهاز</th><th>المدة باليوم</th></tr></thead><tbody>`;
            data.agingReport.above90.forEach(a => {
                html += `<tr style="color:red;"><td>${a.emp}</td><td>${a.asset}</td><td>${a.days} يوم</td></tr>`;
            });
            html += `</tbody></table>`;
        }

        resultDiv.innerHTML = html;
    }).getAdvancedDashboardData({empID: empID});
}
</script>
</body>
</html>
