<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEC IT Assets Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --blue: #003366; --gold: #C5A059; --white: #ffffff; --gray: #f4f7f6; }
        body { font-family: 'Tajawal', sans-serif; background: var(--gray); margin: 0; color: #333; }
        #loginOverlay { position: fixed; inset: 0; background: linear-gradient(135deg, var(--blue) 0%, #001a33 100%); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 320px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.3); border-top: 8px solid var(--gold); }
        .login-card img { max-width: 120px; margin-bottom: 20px; }
        .login-card input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        header { background: var(--blue); color: white; padding: 0 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--gold); height: 65px; position: sticky; top: 0; z-index: 100; }
        .logo-container { display: flex; align-items: center; gap: 10px; background: white; padding: 5px 12px; border-radius: 8px; height: 45px; }
        .logo-container img { height: 35px; }
        .container { max-width: 900px; margin: 20px auto; background: white; padding: 25px; border-radius: 15px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: #eee; cursor: pointer; border-radius: 8px; font-weight: bold; font-family: inherit; }
        .tab-btn.active { background: var(--blue); color: white; }
        .search-area { background: #eef2f3; padding: 15px; border-radius: 12px; margin-bottom: 20px; border-right: 6px solid var(--blue); display: flex; gap: 10px; align-items: flex-end; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 0.9rem; }
        .btn-blue { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-gold { background: var(--gold); color: var(--blue); border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .signature-wrapper { border: 2px dashed #bbb; background: #fdfdfd; height: 160px; position: relative; margin: 10px 0; border-radius: 8px; }
        canvas { width: 100%; height: 100%; }
        #printSignatureImg { display: none; max-height: 100px; margin: 10px auto; }
        
        /* تصميم جدول العهدة الجديد */
        #employeeAssetsWrapper { display:none; margin: 20px 0; padding: 15px; border: 1px solid #eee; border-radius: 10px; background: #fff; }
        .asset-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        .asset-table th { background: var(--blue); color: white; padding: 10px; text-align: center; }
        .asset-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        .btn-select { background: var(--gold); border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 0.7rem; }

        @media print {
            .no-print, header, #loginOverlay, .tabs, button, .signature-wrapper, #employeeAssetsWrapper { display: none !important; }
            .container { display: block !important; box-shadow: none; width: 100%; border: none; }
            .print-header { display: flex !important; align-items: center; justify-content: center; border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 20px; }
            #printSignatureImg { display: block !important; }
            input, select, textarea { border: none !important; font-weight: bold; background: transparent !important; }
        }
        .print-header { display: none; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <img src="logo.png" alt="UEC Logo" onerror="this.src='https://via.placeholder.com/100?text=UEC'">
        <h2 style="color:var(--blue); margin-top:0;">IT ASSETS</h2>
        <input type="text" id="userInput" placeholder="Username">
        <input type="password" id="passInput" placeholder="Password">
        <button onclick="handleLogin()" class="btn-blue" id="loginBtn" style="width:100%">Login</button>
    </div>
</div>

<header>
    <div class="logo-container">
        <img src="logo.png" alt="Logo">
        <div style="border-right: 1px solid #ddd; padding-right: 8px;">
            <b style="color:var(--blue); font-size: 1rem; line-height:1;">UEC</b>
            <span style="color:var(--gold); font-size:0.55rem; display:block; font-weight:bold;">UNIVERSITY OF EAST CAPITAL</span>
        </div>
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
        <span id="adminInfo" style="font-size:0.75rem;"></span>
        <button onclick="toggleLang()" class="btn-gold" id="langBtn" style="padding:4px 12px; font-size:0.7rem;">English</button>
        <button onclick="handleLogout()" class="btn-blue" style="background:#d9534f; padding:4px 12px; font-size:0.7rem;">Logout</button>
    </div>
</header>

<div class="container" id="mainApp">
    <div class="tabs no-print">
        <button id="formTab" class="tab-btn active" onclick="switchTab('form')">النماذج | Forms</button>
        <button id="dashTab" class="tab-btn" onclick="switchTab('dash')" style="display:none;">الإحصائيات | Dashboard</button>
    </div>

    <div class="print-header">
        <img src="logo.png" height="60">
        <div style="text-align:center; margin-right:20px;">
            <h2 style="margin:0">University of East Capital</h2>
            <p style="margin:2px 0">Asset Handover Form | استمارة تسليم عهدة</p>
        </div>
    </div>

    <div id="formSection">
        <div class="search-area no-print">
            <div style="flex:1"><label id="lblSearch">البحث بالرقم الوظيفي</label><input type="text" id="searchID"></div>
            <button type="button" onclick="searchEmployee()" class="btn-gold" id="btnSearch">Search</button>
            <button type="button" onclick="resetForm()" class="btn-blue" style="background:#5bc0de;">New</button>
        </div>

        <form id="assetForm">
            <div id="transferSection" class="no-print" style="display:none; background:#fff9eb; padding:15px; border-radius:10px; margin-bottom:15px; border: 1px solid var(--gold);">
                <label id="lblTransferTo">نقل العهدة إلى:</label>
                <input type="text" id="newReceiver" placeholder="اسم الموظف الجديد...">
            </div>

            <div class="grid">
                <div style="grid-column: span 2">
                    <label id="lblTrans">نوع العملية</label>
                    <select id="transType" onchange="checkTransfer()">
                        <option value="Issue">Issue (صرف عهدة)</option>
                        <option value="Return">Return (إرجاع عهدة)</option>
                        <option value="Transfer">Transfer (نقل ملكية)</option>
                    </select>
                </div>
                <div><label id="lblID">الرقم الوظيفي</label><input type="text" id="empID" required></div>
                <div><label id="lblName">اسم الموظف</label><input type="text" id="empName" required></div>
                <div><label id="lblType">نوع الجهاز</label><select id="assetList"></select></div>
                <div><label id="lblSN">السيريال (S/N)</label><input type="text" id="sn" required></div>
                <div style="grid-column: span 2"><label id="lblSpecs">المواصفات</label><textarea id="specs" rows="2"></textarea></div>
            </div>

            <!-- جدول العهدة المتعددة المدمج -->
            <div id="employeeAssetsWrapper" class="no-print">
                <h4 id="lblAssetsTitle" style="color: var(--blue); margin: 0 0 10px 0; border-bottom: 2px solid var(--gold);">العهدة الحالية | Assets</h4>
                <table class="asset-table">
                    <thead>
                        <tr>
                            <th>التاريخ</th>
                            <th>الجهاز</th>
                            <th>S/N</th>
                            <th>الإجراء</th>
                        </tr>
                    </thead>
                    <tbody id="employeeAssetsBody"></tbody>
                </table>
            </div>

            <label id="lblSign" class="no-print">التوقيع</label>
            <div class="signature-wrapper no-print">
                <canvas id="signature-pad"></canvas>
                <button type="button" onclick="signaturePad.clear()" style="position:absolute; bottom:10px; left:10px;">Clear</button>
            </div>
            <img id="printSignatureImg">
            
            <div class="grid no-print" style="margin-top:20px">
                <button type="submit" id="saveBtn" class="btn-blue">حفظ البيانات</button>
                <button type="button" onclick="preparePrint()" id="btnPrint" class="btn-gold">طباعة</button>
            </div>
        </form>
    </div>

    <div id="dashSection" style="display:none;">
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; text-align:center;">
             <div style="background:#fff; padding:15px; border-radius:10px; border-bottom:5px solid var(--blue);"><h3>Total</h3><p id="totalAssets" style="font-size:2rem; font-weight:bold; color:var(--blue);">0</p></div>
             <div style="background:#fff; padding:15px; border-radius:10px; border-bottom:5px solid green;"><h3>Issued</h3><p id="issuedAssets" style="font-size:2rem; font-weight:bold; color:green;">0</p></div>
             <div style="background:#fff; padding:15px; border-radius:10px; border-bottom:5px solid var(--gold);"><h3>In Stock</h3><p id="stockAssets" style="font-size:2rem; font-weight:bold; color:var(--gold);">0</p></div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-r35RwmB06Ydm2EkXF5P2yMpXu-d4QeeseN5QJ9UpKGNWsqQB3P27OvVT-ZjcYRtC/exec"; // استبدل بالرابط الخاص بك
    const canvas = document.getElementById('signature-pad');
    const signaturePad = new SignaturePad(canvas);
    let lang = localStorage.getItem('uec_lang') || 'ar';
    let loadedSignature = "";

    const translations = {
        ar: { search: "البحث بالرقم الوظيفي", btnSearch: "بحث", trans: "نوع العملية", id: "الرقم الوظيفي", name: "اسم الموظف", type: "نوع الجهاز", sn: "السيريال", specs: "المواصفات", sign: "التوقيع", save: "حفظ البيانات", print: "طباعة", langBtn: "English", assetsTitle: "العهدة الحالية المسجلة" },
        en: { search: "Search by ID", btnSearch: "Search", trans: "Process Type", id: "Emp ID", name: "Emp Name", type: "Asset Type", sn: "S/N Number", specs: "Specifications", sign: "Signature", save: "Save Data", print: "Print", langBtn: "العربية", assetsTitle: "Currently Registered Assets" }
    };

    function applyLang() {
        const d = translations[lang];
        document.getElementById('mainHtml').dir = lang === 'ar' ? 'rtl' : 'ltr';
        document.getElementById('langBtn').innerText = d.langBtn;
        document.getElementById('lblSearch').innerText = d.search;
        document.getElementById('btnSearch').innerText = d.btnSearch;
        document.getElementById('lblTrans').innerText = d.trans;
        document.getElementById('lblID').innerText = d.id;
        document.getElementById('lblName').innerText = d.name;
        document.getElementById('lblType').innerText = d.type;
        document.getElementById('lblSN').innerText = d.sn;
        document.getElementById('lblSpecs').innerText = d.specs;
        document.getElementById('lblSign').innerText = d.sign;
        document.getElementById('saveBtn').innerText = d.save;
        document.getElementById('btnPrint').innerText = d.print;
        document.getElementById('lblAssetsTitle').innerText = d.assetsTitle;
    }

    function toggleLang() {
        lang = lang === 'ar' ? 'en' : 'ar';
        localStorage.setItem('uec_lang', lang);
        applyLang();
        resizeCanvas();
    }

    function handleLogin() {
        const user = document.getElementById('userInput').value;
        const pass = document.getElementById('passInput').value;
        const btn = document.getElementById('loginBtn');
        if(!user || !pass) return alert("Enter credentials");
        btn.disabled = true; btn.innerText = "Wait...";

        fetch(`${SCRIPT_URL}?action=login`, { method: 'POST', body: JSON.stringify({user, pass}) })
        .then(res => res.json()).then(data => {
            if(data.status === "success") {
                localStorage.setItem('uec_user', data.name);
                localStorage.setItem('uec_devices', JSON.stringify(data.devices));
                localStorage.setItem('uec_isSuper', data.isSuper);
                showApp();
            } else { alert(data.message); btn.disabled = false; btn.innerText = "Login"; }
        });
    }

    function showApp() {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('adminInfo').innerText = "User: " + localStorage.getItem('uec_user');
        if(localStorage.getItem('uec_isSuper') === 'true') document.getElementById('dashTab').style.display = 'block';
        const devices = JSON.parse(localStorage.getItem('uec_devices') || '[]');
        document.getElementById('assetList').innerHTML = devices.map(d => `<option value="${d}">${d}</option>`).join('');
        applyLang();
        resizeCanvas();
    }

    function searchEmployee() {
        const empID = document.getElementById('searchID').value;
        if(!empID) return alert("ادخل الرقم الوظيفي");
        const btn = document.getElementById('btnSearch');
        btn.innerText = "...";

        fetch(`${SCRIPT_URL}?action=search`, { method: 'POST', body: JSON.stringify({empID}) })
        .then(res => res.json()).then(res => {
            btn.innerText = translations[lang].btnSearch;
            const wrapper = document.getElementById('employeeAssetsWrapper');
            const tbody = document.getElementById('employeeAssetsBody');
            tbody.innerHTML = "";

            if(res.data && res.data.length > 0) {
                wrapper.style.display = "block";
                const last = res.data[res.data.length - 1];
                document.getElementById('empID').value = last[3];
                document.getElementById('empName').value = last[4];
                if(last[8]) { loadedSignature = last[8]; document.getElementById('printSignatureImg').src = loadedSignature; }

                res.data.reverse().forEach(row => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${new Date(row[0]).toLocaleDateString()}</td>
                        <td>${row[5]}</td>
                        <td>${row[6]}</td>
                        <td><button type="button" class="btn-select" onclick="selectAsset('${row[5]}', '${row[6]}', '${row[7].replace(/\n/g, ' ')}')">اختيار</button></td>
                    `;
                    tbody.appendChild(tr);
                });
            } else {
                alert("لا توجد بيانات لهذا الموظف");
                wrapper.style.display = "none";
            }
        });
    }

    function selectAsset(type, sn, specs) {
        document.getElementById('assetList').value = type;
        document.getElementById('sn').value = sn;
        document.getElementById('specs').value = specs;
        document.getElementById('transType').focus();
    }

    function resetForm() {
        document.getElementById('assetForm').reset();
        document.getElementById('searchID').value = "";
        document.getElementById('employeeAssetsWrapper').style.display = "none";
        signaturePad.clear();
        loadedSignature = "";
        document.getElementById('printSignatureImg').style.display = "none";
    }

    document.getElementById('assetForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('saveBtn');
        btn.disabled = true; btn.innerText = "Saving...";
        
        const payload = {
            admin: localStorage.getItem('uec_user'),
            trans: document.getElementById('transType').value + (document.getElementById('newReceiver').value ? " to " + document.getElementById('newReceiver').value : ""),
            empID: document.getElementById('empID').value,
            empName: document.getElementById('empName').value,
            asset: document.getElementById('assetList').value,
            sn: document.getElementById('sn').value,
            specs: document.getElementById('specs').value,
            signature: signaturePad.isEmpty() ? loadedSignature : signaturePad.toDataURL()
        };

        fetch(`${SCRIPT_URL}?action=save`, { method: 'POST', body: JSON.stringify(payload) })
        .then(res => res.text()).then(t => { 
            if(t.includes("Success")) { alert("تم الحفظ بنجاح!"); resetForm(); }
            btn.disabled = false; btn.innerText = translations[lang].save;
        });
    };

    function switchTab(t) {
        document.getElementById('formSection').style.display = t === 'form' ? 'block' : 'none';
        document.getElementById('dashSection').style.display = t === 'dash' ? 'block' : 'none';
        document.getElementById('formTab').className = t === 'form' ? 'tab-btn active' : 'tab-btn';
        document.getElementById('dashTab').className = t === 'dash' ? 'tab-btn active' : 'tab-btn';
        if(t === 'dash') loadDashboard();
    }

    function loadDashboard() {
        fetch(`${SCRIPT_URL}?action=getDashboard`, { method: 'POST', body: JSON.stringify({user: localStorage.getItem('uec_user')}) })
        .then(res => res.json()).then(s => {
            document.getElementById('totalAssets').innerText = s.total;
            document.getElementById('issuedAssets').innerText = s.issued;
            document.getElementById('stockAssets').innerText = s.returned;
        });
    }

    function preparePrint() {
        const sig = signaturePad.isEmpty() ? loadedSignature : signaturePad.toDataURL();
        if(!sig) return alert("الرجاء التوقيع أولاً");
        document.getElementById('printSignatureImg').src = sig;
        document.getElementById('printSignatureImg').style.display = "block";
        setTimeout(() => window.print(), 500);
    }

    function checkTransfer() { document.getElementById('transferSection').style.display = document.getElementById('transType').value === 'Transfer' ? 'block' : 'none'; }
    function handleLogout() { localStorage.clear(); window.location.reload(); }
    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        signaturePad.clear();
    }

    window.onresize = resizeCanvas;
    if(localStorage.getItem('uec_user')) showApp();
</script>
</body>
</html>
