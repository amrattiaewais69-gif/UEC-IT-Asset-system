<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEC IT Asset System</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --blue: #003366; --gold: #C5A059; --white: #ffffff; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f4f8; margin: 0; }
        header { background: var(--blue); color: white; padding: 5px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--gold); position: sticky; top: 0; z-index: 100; height: 60px; }
        .logo-container { display: flex; align-items: center; gap: 10px; background: white; padding: 5px 12px; border-radius: 6px; height: 45px; overflow: hidden; }
        .logo-container img { height: 35px; width: auto; object-fit: contain; }
        .container { max-width: 950px; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .search-area { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 25px; border-right: 5px solid var(--blue); display: flex; gap: 10px; align-items: flex-end; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn-blue { background: var(--blue); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-gold { background: var(--gold); color: var(--blue); border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .signature-wrapper { border: 2px dashed #ddd; background: #fafafa; height: 160px; position: relative; margin: 10px 0; border-radius: 8px; }
        canvas { width: 100%; height: 100%; }
        #searchSignaturePreview { display: none; margin: 10px 0; padding: 10px; border: 1px solid #eee; border-radius: 8px; text-align: center; background: #fff; }
        #searchSignaturePreview img { max-height: 80px; border: 1px solid #ddd; }
        #printSignatureImg { display: none; max-height: 100px; margin: 10px auto; }
        #loginOverlay { position: fixed; inset: 0; background: var(--blue); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 30px; border-radius: 15px; width: 320px; text-align: center; border-top: 6px solid var(--gold); }
        @media print {
            .no-print, header, #loginOverlay, button, .signature-wrapper, #searchSignaturePreview { display: none !important; }
            .container { box-shadow: none; margin: 0; width: 100%; display: block !important; border: none; }
            .print-header { display: flex !important; align-items: center; justify-content: center; gap: 20px; border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 20px; }
            .print-header img { height: 70px; width: auto; }
            #printSignatureImg { display: block !important; }
            input, select, textarea { border: none !important; font-weight: bold; padding: 2px !important; }
        }
        .print-header { display: none; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <img src="logo.png" alt="UEC" onerror="this.style.display='none'">
        <h2 style="color:var(--blue); margin-top:0;">UEC IT LOGIN</h2>
        <input type="text" id="userInput" placeholder="Username">
        <input type="password" id="passInput" placeholder="Password" style="margin-top:10px">
        <button onclick="handleLogin()" class="btn-blue" id="loginBtn" style="margin-top:20px; width:100%">Login</button>
    </div>
</div>

<header>
    <div class="logo-container">
        <img src="logo.png" alt="UEC Logo" onerror="this.style.display='none'">
        <div style="border-right: 1px solid #ddd; padding-right: 8px;">
            <b style="color:var(--blue); display:block; line-height:1; font-size: 1rem;">UEC</b>
            <span style="color:var(--gold); font-size:0.6rem; font-weight:bold; white-space: nowrap;">UNIVERSITY OF EAST CAPITAL</span>
        </div>
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
        <span id="adminInfo" style="font-size:0.75rem;"></span>
        <button onclick="toggleLang()" class="btn-gold" id="langBtn" style="padding:4px 12px; font-size: 0.8rem;">English</button>
        <button onclick="handleLogout()" class="btn-blue" style="background:#d9534f; padding:4px 12px; font-size: 0.8rem;">Logout</button>
    </div>
</header>

<div class="container" id="mainApp">
    <div class="print-header">
        <img src="logo.png">
        <div style="text-align:center">
            <h2 style="margin:0">University of East Capital - IT</h2>
            <p style="margin:5px 0">Asset Handover Form | استمارة عهدة</p>
        </div>
    </div>

    <div class="search-area no-print">
        <div style="flex:1"><label id="lblSearch">بحث بالرقم الوظيفي</label><input type="text" id="searchID"></div>
        <button type="button" onclick="searchEmployee()" class="btn-gold" id="btnSearch">Search</button>
        <button type="button" onclick="resetForm()" class="btn-blue" id="btnNew" style="background:#5bc0de">New / جديد</button>
    </div>

    <div id="searchSignaturePreview" class="no-print">
        <p id="lblFoundSig" style="font-size: 0.7rem; color: #666; margin: 0 0 5px 0;">توقيع الموظف المسجل:</p>
        <img id="foundSigImg" src="">
    </div>

    <form id="assetForm">
        <div id="transferSection" class="no-print" style="display:none; background: #fff9eb; padding: 10px; border-radius: 8px; border: 1px solid var(--gold); margin-bottom: 10px;">
            <label id="lblTransferTo">المستلم الجديد:</label>
            <input type="text" id="newReceiver" placeholder="...">
        </div>

        <div class="grid">
            <div style="grid-column: span 2">
                <label id="lblTrans">نوع العملية</label>
                <select id="transType" onchange="checkTransfer()">
                    <option value="Issue">استلام عهدة (Issue)</option>
                    <option value="Return">إرجاع عهدة (Return)</option>
                    <option value="Transfer">نقل ملكية (Transfer)</option>
                </select>
            </div>
            <div><label id="lblID">الرقم الوظيفي</label><input type="text" id="empID" required></div>
            <div><label id="lblName">اسم الموظف</label><input type="text" id="empName" required></div>
            <div><label id="lblType">نوع الجهاز</label><select id="assetList"></select></div>
            <div><label id="lblSN">السيريال (S/N)</label><input type="text" id="sn" required></div>
            <div style="grid-column: span 2"><label id="lblSpecs">المواصفات</label><textarea id="specs" rows="2"></textarea></div>
        </div>

        <label id="lblSign" class="no-print">توقيع الموظف</label>
        <div class="signature-wrapper no-print">
            <canvas id="signature-pad"></canvas>
            <button type="button" onclick="signaturePad.clear()" id="btnClear" style="position:absolute; bottom:8px; left:8px; background:#ff4444; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer; font-size: 0.7rem;">Clear</button>
        </div>
        <img id="printSignatureImg">
        
        <div class="grid no-print" style="margin-top:20px">
            <button type="submit" id="saveBtn" class="btn-blue">حفظ (Save)</button>
            <button type="button" onclick="preparePrint()" id="btnPrint" class="btn-gold">طباعة (Print)</button>
        </div>
    </form>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-r35RwmB06Ydm2EkXF5P2yMpXu-d4QeeseN5QJ9UpKGNWsqQB3P27OvVT-ZjcYRtC/exec"; 
    const canvas = document.getElementById('signature-pad');
    const signaturePad = new SignaturePad(canvas);
    let lang = localStorage.getItem('uec_lang') || 'ar';
    let loadedSignature = "";

    const translations = {
        ar: { 
            search: "بحث بالرقم الوظيفي", btnSearch: "بحث", btnNew: "جديد", trans: "نوع العملية", 
            id: "الرقم الوظيفي", name: "اسم الموظف", type: "نوع الجهاز", sn: "السيريال (S/N)", 
            specs: "المواصفات", sign: "توقيع الموظف", clear: "مسح", save: "حفظ البيانات", 
            print: "طباعة", transfer: "المستلم الجديد:", foundSig: "توقيع الموظف المسجل:",
            clearedAt: "تم إخلاء العهدة بتاريخ: ", transferredTo: "تم النقل إلى: ", at: " بتاريخ: "
        },
        en: { 
            search: "Search by ID", btnSearch: "Search", btnNew: "New", trans: "Transaction Type", 
            id: "ID", name: "Name", type: "Type", sn: "S/N", 
            specs: "Specs", sign: "Signature", clear: "Clear", save: "Save", 
            print: "Print", transfer: "Transfer To:", foundSig: "Registered Signature:",
            clearedAt: "Asset cleared on: ", transferredTo: "Transferred to: ", at: " on: "
        }
    };

    function applyLang() {
        const dict = translations[lang];
        document.getElementById('mainHtml').dir = lang === 'ar' ? 'rtl' : 'ltr';
        document.getElementById('langBtn').innerText = lang === 'ar' ? 'English' : 'العربية';
        document.getElementById('lblSearch').innerText = dict.search;
        document.getElementById('btnSearch').innerText = dict.btnSearch;
        document.getElementById('btnNew').innerText = dict.btnNew;
        document.getElementById('lblTrans').innerText = dict.trans;
        document.getElementById('lblID').innerText = dict.id;
        document.getElementById('lblName').innerText = dict.name;
        document.getElementById('lblType').innerText = dict.type;
        document.getElementById('lblSN').innerText = dict.sn;
        document.getElementById('lblSpecs').innerText = dict.specs;
        document.getElementById('lblSign').innerText = dict.sign;
        document.getElementById('btnClear').innerText = dict.clear;
        document.getElementById('saveBtn').innerText = dict.save;
        document.getElementById('btnPrint').innerText = dict.print;
        document.getElementById('lblTransferTo').innerText = dict.transfer;
        document.getElementById('lblFoundSig').innerText = dict.foundSig;
    }

    function checkTransfer() {
        const type = document.getElementById('transType').value;
        document.getElementById('transferSection').style.display = (type === "Transfer") ? "block" : "none";
    }

    function handleLogin() {
        const user = document.getElementById('userInput').value;
        const pass = document.getElementById('passInput').value;
        fetch(`${SCRIPT_URL}?action=login`, { method: 'POST', body: JSON.stringify({user, pass}) })
        .then(res => res.json()).then(data => {
            if(data.status === "success") {
                localStorage.setItem('uec_admin_name', data.name);
                localStorage.setItem('uec_devices', JSON.stringify(data.devices));
                showApp(data.name, data.devices);
            } else { alert("Login Error!"); }
        });
    }

    function showApp(name, devices) {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('adminInfo').innerText = "Admin: " + name;
        const list = document.getElementById('assetList');
        list.innerHTML = "";
        devices.forEach(d => { let opt = document.createElement('option'); opt.value = d; opt.innerText = d; list.appendChild(opt); });
        resizeCanvas();
    }

    function searchEmployee() {
        const empID = document.getElementById('searchID').value;
        if(!empID) return;
        fetch(`${SCRIPT_URL}?action=search`, { method: 'POST', body: JSON.stringify({empID}) })
        .then(res => res.json()).then(res => {
            if(res.data && res.data.length > 0) {
                const last = res.data[res.data.length - 1];
                const date = last[0]; // التاريخ
                const transType = last[2]; // نوع العملية
                const dict = translations[lang];

                document.getElementById('empID').value = last[3];
                document.getElementById('empName').value = last[4];
                document.getElementById('sn').value = last[6];
                document.getElementById('specs').value = last[7];
                
                // تنبيه ذكي بناءً على الحالة
                if(transType.toLowerCase().includes("transfer")) {
                    alert(dict.transferredTo + transType.replace("Transfer to ", "") + dict.at + date);
                } else if(transType.toLowerCase().includes("return")) {
                    alert(dict.clearedAt + date);
                }

                if(last[8]) {
                    loadedSignature = last[8];
                    document.getElementById('foundSigImg').src = loadedSignature;
                    document.getElementById('searchSignaturePreview').style.display = "block";
                }
            } else { alert("Not Found"); }
        });
    }

    function preparePrint() {
        let sigData = signaturePad.isEmpty() ? loadedSignature : signaturePad.toDataURL();
        if(!sigData) return alert(lang === 'ar' ? "وقع أولاً" : "Sign first");
        document.getElementById('printSignatureImg').src = sigData;
        setTimeout(() => { window.print(); }, 400);
    }

    function resetForm() {
        document.getElementById('assetForm').reset();
        signaturePad.clear();
        loadedSignature = "";
        document.getElementById('searchSignaturePreview').style.display = "none";
        document.getElementById('transferSection').style.display = "none";
        document.getElementById('printSignatureImg').src = "";
    }

    document.getElementById('assetForm').onsubmit = function(e) {
        e.preventDefault();
        let sig = signaturePad.isEmpty() ? loadedSignature : signaturePad.toDataURL();
        const payload = {
            admin: localStorage.getItem('uec_admin_name'),
            trans: document.getElementById('transType').value + (document.getElementById('newReceiver').value ? " to " + document.getElementById('newReceiver').value : ""),
            empID: document.getElementById('empID').value,
            empName: document.getElementById('empName').value,
            asset: document.getElementById('assetList').value,
            sn: document.getElementById('sn').value,
            specs: document.getElementById('specs').value,
            signature: sig
        };
        fetch(`${SCRIPT_URL}?action=save`, { method: 'POST', body: JSON.stringify(payload) })
        .then(() => { alert(lang === 'ar' ? "تم الحفظ!" : "Saved!"); resetForm(); });
    };

    function handleLogout() { localStorage.clear(); window.location.reload(); }
    function toggleLang() { lang = lang === 'ar' ? 'en' : 'ar'; localStorage.setItem('uec_lang', lang); applyLang(); resizeCanvas(); }
    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
    }

    applyLang();
    if(localStorage.getItem('uec_admin_name')) {
        showApp(localStorage.getItem('uec_admin_name'), JSON.parse(localStorage.getItem('uec_devices')));
    }
</script>
</body>
</html>
